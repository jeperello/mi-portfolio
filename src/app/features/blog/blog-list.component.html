<section class="blog-list">
  <app-api-warming *ngIf="isWarming()" 
    mainMessage="Cargando el Blog..." 
    subMessage="Estamos preparando los mejores artículos para vos mientras servimos un café ☕">
  </app-api-warming>

  <div class="blog-grid" *ngIf="!isWarming()">
    @if (blogs(); as list) {
      @for (blog of list; track blog.id) {
        <article class="blog-card">
          <div class="blog-header">
            <span class="blog-date">{{ blog.date }}</span>
          </div>
          <h3>{{ blog.title }}</h3>
          <p>{{ blog.excerpt }}</p>

          <div class="blog-tags">
            @for (tag of blog.tags; track tag) {
              <span class="tag">{{ tag }}</span>
            }
          </div>

          <div class="card-actions">
            <a [routerLink]="['/blog', blog.id]" class="button">
              Leer más
            </a>
          </div>
        </article>
      } @empty {
        <div class="no-blogs">
          <p>Aún no hay entradas en el blog. ¡Pronto habrá contenido interesante!</p>
        </div>
      }
    } @else {
      <!-- Estado de carga inicial mientras no hay blogs y no ha saltado el warming -->
      <div class="loading-placeholder">
        <p>Cargando posts...</p>
      </div>
    }
  </div>
</section>
