<section class="project-showcase">
  <h2>Mis Proyectos</h2>
  <div class="projects-grid">
    <!-- Usamos el pipe 'async' para subscribirnos al Observable projects$ -->
    <!-- y un *ngIf para asegurarnos de que no se renderice nada si no hay proyectos -->
    <div *ngFor="let project of projects$ | async" class="project-card">
      <h3>{{ project.name }}</h3>
      <p>{{ project.description }}</p>

      <h4>Tecnologías Utilizadas:</h4>
      <ul class="technologies-list">
        <li *ngFor="let tech of project.technologies">{{ tech }}</li>
      </ul>

      <div class="card-actions">
        <a [href]="project.repositoryUrl" target="_blank" rel="noopener noreferrer" class="button">
          Ver Repositorio
        </a>
        <a  *ngIf="project.name == 'API Reactiva con Spring WebFlux'"  routerLink="/show-api-reactive" class="button">
          Probar API
        </a>
        <!-- Usamos *ngIf para mostrar el botón solo si existe demoUrl -->
        <a *ngIf="project.demoUrl" [href]="project.demoUrl" target="_blank" rel="noopener noreferrer" class="button primary">
          Ver Demo
        </a>
      </div>
    </div>
  </div>
  <!-- Mensaje por si la lista de proyectos está vacía -->
  <div *ngIf="!(projects$ | async)?.length" class="no-projects">
    <p>Actualmente no hay proyectos para mostrar. ¡Vuelve pronto!</p>
  </div>
</section>
