<nav class="navbar">
  <div class="navbar-container">
    <a routerLink="/about" class="navbar-logo">
      <img src="assets/profile1.jpeg" alt="Jorge Perello, Full Stack Developer (Java + Spring Boot + Angular)" class="navbar-profile-img">
      <span>Jorge Perello</span><span class="full-title-suffix">Full Stack Developer (Java + Spring Boot + Angular)</span>
    </a>
    
    <ul class="navbar-links">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Proyectos</a></li>

           (mouseenter)="hideTooltip()" (click)="hideTooltip()">

        </a>
        @if (showBlogTooltip()) {
          <div class="nav-tooltip">
            ¡Nuevo Post! ✍️
            <div class="tooltip-arrow"></div>
          </div>
        }
      </li>
      <li><a routerLink="/about" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Sobre Mí</a></li>
      <li><a routerLink="/about" fragment="contact">Contacto</a></li>
    </ul>
  </div>
